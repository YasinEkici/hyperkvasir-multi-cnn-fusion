epochs: 60
batch_size: 64
mixed_precision: true
unfreeze_blocks: 2
optimizer:
  type: "adamw"
  head_lr: 1.0e-3
  backbone_lr: 1.0e-4
  weight_decay: 1.0e-4
  llrd_decay: 0.75
scheduler:
  type: "cosine_with_warmup"
  warmup_epochs: 5
loss:
  type: "ce_label_smooth"
  label_smoothing: 0.1
augmentation:
  rand_augment: {N: 2, M: 9}
  cutmix: {alpha: 1.0, prob: 0.5}
  horizontal_flip: true
ema:
  enabled: true
  decay: 0.999
  start_epoch: 5
early_stopping:
  patience: 8
  monitor: "val_macro_f1"
reproducibility:
  seed: 42
  deterministic: true
  cudnn_benchmark: false
tracking:
  backend: "json"
  mlflow_uri: "mlruns"
