abstract: Over the last decade, Convolutional Neural Network (CNN) models have been
  highly successful in solving complex vision problems. However, these deep models
  are perceived as 'black box' methods considering the lack of understanding of their
  internal functioning. There has been a significant recent interest in developing
  explainable deep learning models, and this paper is an effort in this direction...
