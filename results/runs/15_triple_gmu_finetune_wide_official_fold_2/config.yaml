dataset:
  class_imbalance_handling: weighted_sampler
  class_subset: full
  image_size: 224
  name: hyperkvasir_23class
  normalize_mean:
  - 0.485
  - 0.456
  - 0.406
  normalize_std:
  - 0.229
  - 0.224
  - 0.225
  num_classes: 23
  official_split_file: data/splits/official/5_fold_split.csv
  root: ${DATA_ROOT}/hyperkvasir/labeled-images
  split_manifest_dir: data/splits
  split_protocol: hyperkvasir_official_5fold
experiment:
  dataset: configs/dataset/hyperkvasir_23class_official.yaml
  fold: 0
  id: 15_triple_gmu_finetune_wide_official
  method: configs/method/triple_gmu.yaml
  training: configs/training/finetune_wide.yaml
method:
  backbone_names:
  - resnet50
  - mobilenetv2
  - efficientnetb0
  classifier: mlp
  dropout: 0.3
  fusion_type: gmu
  mlp_hidden:
  - 256
  projection_dim: 512
training:
  augmentation:
    cutmix:
      alpha: 1.0
      prob: 0.5
    horizontal_flip: true
    rand_augment:
      M: 9
      N: 2
  batch_size: 64
  early_stopping:
    monitor: val_macro_f1
    patience: 8
  ema:
    decay: 0.999
    enabled: true
    start_epoch: 5
  epochs: 60
  loss:
    label_smoothing: 0.1
    type: ce_label_smooth
  mixed_precision: true
  optimizer:
    backbone_lr: 0.0001
    head_lr: 0.001
    llrd_decay: 0.75
    type: adamw
    weight_decay: 0.0001
  reproducibility:
    cudnn_benchmark: false
    deterministic: true
    seed: 42
  scheduler:
    type: cosine_with_warmup
    warmup_epochs: 5
  tracking:
    backend: json
    mlflow_uri: mlruns
  unfreeze_blocks: 3
